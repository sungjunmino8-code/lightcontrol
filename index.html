<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EyeLight — 스마트 스탠드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #e8e8f0;
    --text-muted: #6b6b85;
    --text-dim: #3a3a55;
    --accent: #7b6cff;
    --accent-glow: rgba(123,108,255,0.25);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── 상단 상태 바 ── */
  .topbar {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 24px 0;
  }
  .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; }
  .logo span { color: var(--accent); }

  .conn-badge {
    display: flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 11px;
    padding: 5px 10px; border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    background: var(--surface);
    cursor: pointer;
    transition: border-color .2s, color .2s;
    user-select: none;
  }
  .conn-badge:hover { border-color: var(--border-hover); color: var(--text); }
  .conn-badge.connected { border-color: rgba(80,220,140,0.35); color: #50dc8c; }
  .conn-badge.scanning { border-color: rgba(123,108,255,0.35); color: var(--accent); animation: pulse-border 1.4s ease-in-out infinite; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-dim); transition: background .3s;
  }
  .conn-badge.connected .dot { background: #50dc8c; box-shadow: 0 0 6px #50dc8c; }
  .conn-badge.scanning .dot { background: var(--accent); animation: blink .8s ease-in-out infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes pulse-border { 0%,100%{box-shadow:0 0 0 0 rgba(123,108,255,0)} 50%{box-shadow:0 0 0 3px rgba(123,108,255,0.15)} }

  /* ── 전구 시각화 ── */
  .bulb-wrap {
    margin: 36px 0 28px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .bulb-glow {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    filter: blur(50px);
    opacity: 0.55;
    background: radial-gradient(circle, #ffcc66 0%, transparent 70%);
    transition: background 0.8s ease, opacity 0.5s;
    pointer-events: none;
  }
  .bulb-svg { position: relative; z-index: 1; }

  /* ── 메인 카드 ── */
  .card {
    width: 100%; max-width: 480px;
    padding: 0 16px;
    display: flex; flex-direction: column; gap: 12px;
    flex: 1;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    transition: border-color .2s;
  }
  .panel:hover { border-color: var(--border-hover); }

  .panel-label {
    font-family: var(--mono);
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-label::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  /* ── 피로도 ── */
  .fatigue-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .fatigue-level {
    font-family: var(--mono);
    font-size: 42px; font-weight: 500;
    line-height: 1;
    transition: color 0.6s;
  }
  .fatigue-bar-wrap { flex: 1; }
  .fatigue-status {
    font-size: 12px; color: var(--text-muted); margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }
  .fatigue-bar {
    height: 6px; background: var(--surface2);
    border-radius: 99px; overflow: hidden;
  }
  .fatigue-fill {
    height: 100%; border-radius: 99px;
    transition: width 0.6s ease, background 0.6s ease;
    width: 0%;
    background: linear-gradient(90deg, #4ade80, #facc15, #f97316, #ef4444);
  }
  .fatigue-segments {
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 9px;
    color: var(--text-dim); margin-top: 5px;
  }

  /* ── 슬라이더 공통 ── */
  .slider-group { display: flex; flex-direction: column; gap: 14px; }
  .slider-row { display: flex; flex-direction: column; gap: 8px; }
  .slider-meta {
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .slider-name { font-size: 13px; font-weight: 500; }
  .slider-val {
    font-family: var(--mono); font-size: 12px;
    color: var(--text-muted);
    transition: color .3s;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 6px;
    border-radius: 99px;
    outline: none; cursor: pointer;
    transition: background .4s;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--text);
    box-shadow: 0 0 0 3px var(--bg), 0 0 10px rgba(255,255,255,0.1);
    transition: transform .15s, box-shadow .15s;
  }
  input[type=range]:hover::-webkit-slider-thumb {
    transform: scale(1.15);
    box-shadow: 0 0 0 3px var(--bg), 0 0 14px rgba(255,255,255,0.2);
  }
  #temp-slider { background: linear-gradient(90deg, #ff8c42 0%, #fff4a0 40%, #b8d4ff 100%); }
  #bright-slider { background: linear-gradient(90deg, #1a1a2e 0%, var(--text) 100%); }

  /* ── 프리셋 ── */
  .presets {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .preset-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 14px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 11px; font-family: var(--sans);
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s, transform .1s;
  }
  .preset-btn:hover { border-color: var(--border-hover); color: var(--text); background: #1e1e2e; }
  .preset-btn:active { transform: scale(.97); }
  .preset-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(123,108,255,0.08); }
  .preset-icon { font-size: 20px; }
  .preset-sub { font-size: 10px; color: var(--text-dim); }

  /* ── 자동 모드 토글 ── */
  .auto-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .auto-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .toggle-wrap { position: relative; }
  .toggle-wrap input { display: none; }
  .toggle-track {
    display: block; width: 44px; height: 24px;
    background: var(--surface2); border-radius: 99px;
    border: 1px solid var(--border);
    cursor: pointer; transition: background .25s, border-color .25s;
    position: relative;
  }
  .toggle-track::after {
    content: '';
    position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--text-muted);
    transition: transform .25s, background .25s;
  }
  .toggle-wrap input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle-wrap input:checked + .toggle-track::after { transform: translateX(20px); background: #fff; }

  /* ── 연결 안내 오버레이 ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; z-index: 100;
    transition: opacity .4s;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-icon { font-size: 52px; }
  .overlay h2 { font-size: 22px; font-weight: 600; }
  .overlay p { font-size: 14px; color: var(--text-muted); text-align: center; max-width: 280px; line-height: 1.6; }
  .btn-primary {
    padding: 13px 32px;
    background: var(--accent);
    color: #fff; font-weight: 600; font-size: 15px;
    border: none; border-radius: 99px;
    cursor: pointer;
    box-shadow: 0 0 30px var(--accent-glow);
    transition: transform .15s, box-shadow .15s;
  }
  .btn-primary:hover { transform: scale(1.03); box-shadow: 0 0 40px rgba(123,108,255,0.4); }
  .btn-primary:active { transform: scale(.98); }
  .btn-secondary {
    padding: 10px 24px;
    background: transparent;
    color: var(--text-muted); font-size: 13px;
    border: 1px solid var(--border); border-radius: 99px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--border-hover); }

  /* ── 토스트 ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 99px; padding: 10px 20px;
    font-size: 13px; color: var(--text);
    opacity: 0; transition: opacity .3s, transform .3s;
    pointer-events: none; white-space: nowrap;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── BLE 로그 ── */
  .ble-log {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
    line-height: 1.7; max-height: 60px; overflow-y: auto;
  }
  .ble-log .tx { color: #7b6cff; }
  .ble-log .rx { color: #50dc8c; }
  .ble-log .err { color: #f97316; }

  .bottom-pad { height: 32px; }
</style>
</head>
<body>

<!-- 연결 오버레이 -->
<div class="overlay" id="overlay">
  <div class="overlay-icon">💡</div>
  <h2>EyeLight</h2>
  <p>스마트 스탠드와 블루투스로 연결하세요.<br>BLE 디바이스를 켜고 시작 버튼을 누르세요.</p>
  <button class="btn-primary" id="connect-btn">블루투스 연결 시작</button>
  <button class="btn-secondary" id="demo-btn">데모 모드로 보기</button>
</div>

<!-- 상단 바 -->
<div class="topbar">
  <div class="logo">Eye<span>Light</span></div>
  <div class="conn-badge" id="conn-badge" onclick="toggleConnection()">
    <div class="dot"></div>
    <span id="conn-text">연결 안 됨</span>
  </div>
</div>

<!-- 전구 시각화 -->
<div class="bulb-wrap">
  <div class="bulb-glow" id="bulb-glow"></div>
  <svg class="bulb-svg" width="90" height="110" viewBox="0 0 90 110" fill="none">
    <ellipse cx="45" cy="50" rx="32" ry="34" fill="url(#bulbGrad)" id="bulb-body"/>
    <rect x="34" y="80" width="22" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>
    <rect x="36" y="85" width="18" height="5" rx="2.5" fill="rgba(255,255,255,0.09)"/>
    <rect x="38" y="90" width="14" height="5" rx="2.5" fill="rgba(255,255,255,0.07)"/>
    <rect x="40" y="95" width="10" height="5" rx="2.5" fill="rgba(255,255,255,0.06)"/>
    <defs>
      <radialGradient id="bulbGrad" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.9" id="grad-inner"/>
        <stop offset="100%" stop-color="#ffcc66" stop-opacity="0.6" id="grad-outer"/>
      </radialGradient>
    </defs>
  </svg>
</div>

<!-- 메인 카드 -->
<div class="card">

  <!-- 안구 피로도 -->
  <div class="panel">
    <div class="panel-label">안구 피로도</div>
    <div class="fatigue-row">
      <div class="fatigue-level" id="fatigue-num">--</div>
      <div class="fatigue-bar-wrap">
        <div class="fatigue-status">
          <span id="fatigue-label">스탠드 연결 필요</span>
          <span id="fatigue-time" style="font-family:var(--mono);font-size:11px"></span>
        </div>
        <div class="fatigue-bar"><div class="fatigue-fill" id="fatigue-fill"></div></div>
        <div class="fatigue-segments">
          <span>낮음</span><span>보통</span><span>높음</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 빛 조절 -->
  <div class="panel">
    <div class="panel-label">빛 조절</div>
    <div class="slider-group">
      <div class="slider-row">
        <div class="slider-meta">
          <span class="slider-name">색온도</span>
          <span class="slider-val" id="temp-val">4000K</span>
        </div>
        <input type="range" id="temp-slider" min="2700" max="6500" value="4000" step="100">
      </div>
      <div class="slider-row">
        <div class="slider-meta">
          <span class="slider-name">밝기</span>
          <span class="slider-val" id="bright-val">70%</span>
        </div>
        <input type="range" id="bright-slider" min="5" max="100" value="70" step="1">
      </div>
    </div>
  </div>

  <!-- 프리셋 -->
  <div class="panel">
    <div class="panel-label">프리셋</div>
    <div class="presets">
      <button class="preset-btn" data-temp="6500" data-bright="90" onclick="applyPreset(this)">
        <span class="preset-icon">💻</span>
        <span>집중 작업</span>
        <span class="preset-sub">6500K · 90%</span>
      </button>
      <button class="preset-btn active" data-temp="4000" data-bright="70" onclick="applyPreset(this)">
        <span class="preset-icon">📖</span>
        <span>독서</span>
        <span class="preset-sub">4000K · 70%</span>
      </button>
      <button class="preset-btn" data-temp="2700" data-bright="35" onclick="applyPreset(this)">
        <span class="preset-icon">🌙</span>
        <span>취침 준비</span>
        <span class="preset-sub">2700K · 35%</span>
      </button>
    </div>
  </div>

  <!-- 자동 모드 -->
  <div class="panel">
    <div class="panel-label">자동 조절</div>
    <div class="auto-row">
      <div>
        <div style="font-size:14px;font-weight:500">피로도 기반 자동 조절</div>
        <div class="auto-desc" id="auto-desc">꺼짐 — 슬라이더를 직접 조작합니다</div>
      </div>
      <label class="toggle-wrap">
        <input type="checkbox" id="auto-toggle" onchange="toggleAuto()">
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <!-- BLE 통신 로그 -->
  <div class="panel" id="log-panel" style="display:none">
    <div class="panel-label">BLE 통신 로그</div>
    <div class="ble-log" id="ble-log"></div>
  </div>

</div>
<div class="bottom-pad"></div>
<div class="toast" id="toast"></div>

<script>
// ── 상태 ──
let device = null, characteristic = null;
let isConnected = false, isDemoMode = false, isAuto = false;
let fatigueLevel = 0;
let demoInterval = null, autoInterval = null;

// BLE 상수 (실제 스탠드 펌웨어에 맞게 수정)
const BLE_SERVICE     = '0000ffe0-0000-1000-8000-00805f9b34fb';
const BLE_CHAR_WRITE  = '0000ffe1-0000-1000-8000-00805f9b34fb';
const BLE_CHAR_NOTIFY = '0000ffe2-0000-1000-8000-00805f9b34fb';

// ── UI 요소 ──
const overlay      = document.getElementById('overlay');
const badge        = document.getElementById('conn-badge');
const connText     = document.getElementById('conn-text');
const fatigueNum   = document.getElementById('fatigue-num');
const fatigueFill  = document.getElementById('fatigue-fill');
const fatigueLabel = document.getElementById('fatigue-label');
const fatigueTime  = document.getElementById('fatigue-time');
const tempSlider   = document.getElementById('temp-slider');
const brightSlider = document.getElementById('bright-slider');
const tempVal      = document.getElementById('temp-val');
const brightVal    = document.getElementById('bright-val');
const bulbGlow     = document.getElementById('bulb-glow');
const logPanel     = document.getElementById('log-panel');
const bleLog       = document.getElementById('ble-log');
const gradInner    = document.getElementById('grad-inner');
const gradOuter    = document.getElementById('grad-outer');

// ── 색온도 → RGB ──
function kelvinToHex(k) {
  const t = Math.max(1000, Math.min(40000, k)) / 100;
  let r, g, b;
  if (t <= 66) { r = 255; g = Math.min(255, Math.max(0, 99.47 * Math.log(t) - 161.12)); }
  else { r = Math.min(255, Math.max(0, 329.7 * Math.pow(t - 60, -0.133))); g = Math.min(255, Math.max(0, 288.1 * Math.pow(t - 60, -0.0755))); }
  if (t >= 66) b = 255;
  else if (t <= 19) b = 0;
  else b = Math.min(255, Math.max(0, 138.52 * Math.log(t - 10) - 305.04));
  return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
}

// ── 전구 시각화 업데이트 ──
function updateBulb(tempK, bright) {
  const col = kelvinToHex(tempK);
  const warmHex = kelvinToHex(Math.max(2700, tempK - 1500));
  const alpha = bright / 100;
  bulbGlow.style.background = `radial-gradient(circle, ${col} 0%, transparent 70%)`;
  bulbGlow.style.opacity = 0.3 + alpha * 0.5;
  gradInner.setAttribute('stop-color', col);
  gradOuter.setAttribute('stop-color', warmHex);
  gradInner.setAttribute('stop-opacity', 0.6 + alpha * 0.35);
}

// ── 슬라이더 이벤트 ──
function onSliderChange() {
  const temp = +tempSlider.value;
  const bright = +brightSlider.value;
  tempVal.textContent = temp + 'K';
  brightVal.textContent = bright + '%';
  updateBulb(temp, bright);
  if (isConnected) sendBLE(temp, bright);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}
tempSlider.addEventListener('input', onSliderChange);
brightSlider.addEventListener('input', onSliderChange);

// ── BLE ──
async function connectBLE() {
  if (!navigator.bluetooth) {
    showToast('이 브라우저는 Web Bluetooth를 지원하지 않아요 (Chrome 권장)');
    return;
  }
  setBadge('scanning', '스캔 중...');
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'EyeLight' }],
      optionalServices: [BLE_SERVICE]
    });
    device.addEventListener('gattserverdisconnected', onDisconnect);
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(BLE_SERVICE);
    characteristic = await service.getCharacteristic(BLE_CHAR_WRITE);

    try {
      const notifyChar = await service.getCharacteristic(BLE_CHAR_NOTIFY);
      await notifyChar.startNotifications();
      notifyChar.addEventListener('characteristicvaluechanged', onNotify);
      logBLE('rx', 'Notifications 활성화');
    } catch { logBLE('err', 'Notify 채널 없음 — 쓰기 전용 모드'); }

    isConnected = true;
    isDemoMode = false;
    setBadge('connected', device.name || 'EyeLight Stand');
    overlay.classList.add('hidden');
    logPanel.style.display = 'block';
    logBLE('rx', `연결됨: ${device.name}`);
    showToast('✓ 스탠드와 연결되었습니다');
    onSliderChange();
  } catch (e) {
    setBadge('', '연결 안 됨');
    logBLE('err', e.message);
    showToast('연결 실패 — 디바이스를 확인해 주세요');
  }
}

function onDisconnect() {
  isConnected = false;
  setBadge('', '연결 끊김');
  showToast('스탠드 연결이 끊어졌습니다');
}

async function toggleConnection() {
  if (isConnected) { device?.gatt?.disconnect(); }
  else if (isDemoMode) { stopDemo(); overlay.classList.remove('hidden'); }
  else { overlay.classList.remove('hidden'); }
}

function onNotify(e) {
  const raw = new TextDecoder().decode(e.target.value);
  logBLE('rx', raw);
  const match = raw.match(/FAT:(\d+)/);
  if (match) updateFatigue(+match[1]);
}

// BLE 패킷: "T:4000,B:70\n"
async function sendBLE(temp, bright) {
  if (!characteristic) return;
  try {
    const cmd = `T:${temp},B:${bright}\n`;
    const encoded = new TextEncoder().encode(cmd);
    await characteristic.writeValueWithoutResponse(encoded);
    logBLE('tx', cmd.trim());
  } catch (e) { logBLE('err', e.message); }
}

function logBLE(type, msg) {
  const line = document.createElement('div');
  const now = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  line.innerHTML = `<span style="color:var(--text-dim)">${now}</span> <span class="${type}">${type.toUpperCase()}</span> ${msg}`;
  bleLog.appendChild(line);
  bleLog.scrollTop = bleLog.scrollHeight;
  if (bleLog.children.length > 30) bleLog.removeChild(bleLog.firstChild);
}

// ── 피로도 업데이트 ──
function updateFatigue(val) {
  fatigueLevel = val;
  fatigueNum.textContent = val;
  fatigueFill.style.width = val + '%';
  const now = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
  fatigueTime.textContent = now;

  if (val <= 33) {
    fatigueNum.style.color = '#4ade80';
    fatigueLabel.textContent = '낮음 — 정상 상태';
  } else if (val <= 66) {
    fatigueNum.style.color = '#facc15';
    fatigueLabel.textContent = '보통 — 주의 필요';
  } else {
    fatigueNum.style.color = '#f97316';
    fatigueLabel.textContent = '높음 — 빛 자동 조정 권장';
  }

  if (isAuto) autoAdjust(val);
}

// ── 자동 조절 ──
function autoAdjust(val) {
  let temp, bright;
  if (val <= 33)       { temp = 6500; bright = 90; }
  else if (val <= 66)  { temp = 4000; bright = 70; }
  else                 { temp = 2700; bright = 40; }

  tempSlider.value = temp;
  brightSlider.value = bright;
  tempVal.textContent = temp + 'K';
  brightVal.textContent = bright + '%';
  updateBulb(temp, bright);
  if (isConnected) sendBLE(temp, bright);
}

function toggleAuto() {
  isAuto = document.getElementById('auto-toggle').checked;
  document.getElementById('auto-desc').textContent = isAuto
    ? '켜짐 — 피로도에 따라 자동으로 빛을 조절합니다'
    : '꺼짐 — 슬라이더를 직접 조작합니다';
  if (isAuto && fatigueLevel > 0) autoAdjust(fatigueLevel);
}

// ── 프리셋 ──
function applyPreset(btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const temp = +btn.dataset.temp, bright = +btn.dataset.bright;
  tempSlider.value = temp; brightSlider.value = bright;
  tempVal.textContent = temp + 'K'; brightVal.textContent = bright + '%';
  updateBulb(temp, bright);
  if (isConnected) sendBLE(temp, bright);
  if (isDemoMode) logBLE('tx', `Preset → T:${temp},B:${bright}`);
  showToast(`프리셋 적용 — ${temp}K, ${bright}%`);
}

// ── 데모 모드 ──
function startDemo() {
  isDemoMode = true;
  overlay.classList.add('hidden');
  setBadge('connected', '데모 모드');
  logPanel.style.display = 'block';
  logBLE('rx', '데모 모드 시작 (가상 데이터)');
  updateBulb(+tempSlider.value, +brightSlider.value);

  let t = 0;
  demoInterval = setInterval(() => {
    t += 1;
    // 사인파로 피로도 시뮬레이션 (0–100)
    const val = Math.round(50 + 45 * Math.sin(t * 0.12) + 5 * Math.sin(t * 0.7));
    updateFatigue(Math.max(0, Math.min(100, val)));
    logBLE('rx', `FAT:${val}`);
  }, 2000);
}

function stopDemo() {
  clearInterval(demoInterval);
  isDemoMode = false;
  setBadge('', '연결 안 됨');
  fatigueNum.textContent = '--';
  fatigueFill.style.width = '0%';
  fatigueLabel.textContent = '스탠드 연결 필요';
  fatigueTime.textContent = '';
  logPanel.style.display = 'none';
}

// ── 배지 ──
function setBadge(state, text) {
  badge.className = 'conn-badge' + (state ? ' ' + state : '');
  connText.textContent = text;
}

// ── 토스트 ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── 버튼 바인딩 ──
document.getElementById('connect-btn').onclick = connectBLE;
document.getElementById('demo-btn').onclick = startDemo;

// 초기 전구 렌더
updateBulb(4000, 70);
</script>
</body>
</html>
